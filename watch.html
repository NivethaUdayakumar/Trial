<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>W2UI Row Watchlist</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/w2ui@2.0.0/w2ui-2.0.min.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }
    #grid {
      width: 100%;
      height: 420px;
    }
    .watch-btn {
      padding: 4px 10px;
      border: 1px solid #999;
      background: #f5f5f5;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .watch-btn:hover {
      background: #e9e9e9;
    }
  </style>
</head>
<body>
  <div id="grid"></div>

  <script type="module">
    import { w2grid, w2popup, w2alert, w2confirm } from 'https://cdn.jsdelivr.net/npm/w2ui@2.0/+esm';

    const WATCHLIST_KEY = 'watchlists_store_v2';
    const MAIN_WATCHLIST = 'mainlist';
    const MAX_RUNS_PER_BLOCK = 3;

    function normalizeWatchlists(data) {
      const out = {};

      for (const [name, items] of Object.entries(data || {})) {
        out[name] = Array.isArray(items)
          ? items
              .map(item => {
                if (typeof item === 'string') {
                  return { run: item, block: '' };
                }
                return {
                  run: String(item?.run || ''),
                  block: String(item?.block || '')
                };
              })
              .filter(item => item.run)
          : [];
      }

      if (!out[MAIN_WATCHLIST]) {
        out[MAIN_WATCHLIST] = [];
      }

      return out;
    }

    function getWatchlists() {
      try {
        const raw = JSON.parse(localStorage.getItem(WATCHLIST_KEY) || '{}');
        const normalized = normalizeWatchlists(raw);
        saveWatchlists(normalized);
        return normalized;
      } catch (e) {
        const fallback = { [MAIN_WATCHLIST]: [] };
        saveWatchlists(fallback);
        return fallback;
      }
    }

    function saveWatchlists(data) {
      localStorage.setItem(WATCHLIST_KEY, JSON.stringify(normalizeWatchlists(data)));
    }

    function getRunFromRecord(record) {
      return record.run || record.name || record.run_name || String(record.recid);
    }

    function getBlockFromRecord(record) {
      return record.block || '';
    }

    function fillWatchlistDropdown(selectedName = '') {
      const select = document.getElementById('watchlistSelect');
      if (!select) return;

      const data = getWatchlists();
      const names = Object.keys(data).sort((a, b) => {
        if (a === MAIN_WATCHLIST) return -1;
        if (b === MAIN_WATCHLIST) return 1;
        return a.localeCompare(b);
      });

      select.innerHTML = '';

      for (const name of names) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        if (name === selectedName) opt.selected = true;
        select.appendChild(opt);
      }

      if (!select.value && names.length > 0) {
        select.value = names[0];
      }

      updateDeleteWatchlistButtonState();
      renderWatchlistRuns();
    }

    function updateDeleteWatchlistButtonState() {
      const select = document.getElementById('watchlistSelect');
      const btn = document.getElementById('deleteWatchlistBtn');
      if (!select || !btn) return;

      btn.disabled = select.value === MAIN_WATCHLIST;
    }

    function renderWatchlistRuns() {
      const select = document.getElementById('watchlistSelect');
      const listBox = document.getElementById('watchlistRunsBox');
      const countEl = document.getElementById('watchlistCount');

      if (!select || !listBox || !countEl) return;

      const data = getWatchlists();
      const watchlistName = select.value;
      const runs = watchlistName && data[watchlistName] ? data[watchlistName] : [];

      listBox.innerHTML = '';

      for (const item of runs) {
        const opt = document.createElement('option');
        opt.value = JSON.stringify(item);
        opt.textContent = `${item.block || 'NA'} | ${item.run}`;
        listBox.appendChild(opt);
      }

      countEl.textContent = `Runs: ${runs.length}`;
      updateDeleteWatchlistButtonState();
    }

    window.renderWatchlistRuns = renderWatchlistRuns;

    window.createWatchlist = function createWatchlist() {
      const input = document.getElementById('newWatchlistName');
      if (!input) return;

      const name = input.value.trim();
      if (!name) {
        w2alert('Enter a watchlist name');
        return;
      }

      const data = getWatchlists();
      if (data[name]) {
        w2alert('Watchlist already exists');
        return;
      }

      data[name] = [];
      saveWatchlists(data);
      input.value = '';
      fillWatchlistDropdown(name);
    };

    window.deleteWatchlist = function deleteWatchlist() {
      const select = document.getElementById('watchlistSelect');
      if (!select || !select.value) {
        w2alert('Select a watchlist');
        return;
      }

      const name = select.value;

      if (name === MAIN_WATCHLIST) {
        w2alert('mainlist cannot be deleted');
        return;
      }

      w2confirm(`Delete watchlist "${name}"?`)
        .yes(() => {
          const data = getWatchlists();
          delete data[name];
          saveWatchlists(data);
          fillWatchlistDropdown(MAIN_WATCHLIST);
        });
    };

    window.addCurrentRunToWatchlist = function addCurrentRunToWatchlist() {
      const select = document.getElementById('watchlistSelect');
      const currentRunEl = document.getElementById('currentRunValue');
      const currentBlockEl = document.getElementById('currentBlockValue');

      if (!select || !select.value) {
        w2alert('Select a watchlist first');
        return;
      }

      const run = currentRunEl ? currentRunEl.textContent.trim() : '';
      const block = currentBlockEl ? currentBlockEl.textContent.trim() : '';

      if (!run) {
        w2alert('No run selected');
        return;
      }

      const data = getWatchlists();
      const watchlistName = select.value;
      const currentItems = Array.isArray(data[watchlistName]) ? [...data[watchlistName]] : [];

      const alreadyExists = currentItems.some(item => item.run === run && item.block === block);
      if (alreadyExists) {
        w2alert(`"${run}" already exists in "${watchlistName}"`);
        return;
      }

      if (watchlistName === MAIN_WATCHLIST) {
        const sameBlockCount = currentItems.filter(item => item.block === block).length;
        if (sameBlockCount >= MAX_RUNS_PER_BLOCK) {
          w2alert(`Maximum ${MAX_RUNS_PER_BLOCK} runs allowed for block "${block}" in "${watchlistName}". Delete an existing run first.`);
          return;
        }
      }

      currentItems.push({ run, block });
      currentItems.sort((a, b) => {
        const blockCmp = String(a.block).localeCompare(String(b.block));
        if (blockCmp !== 0) return blockCmp;
        return String(a.run).localeCompare(String(b.run));
      });

      data[watchlistName] = currentItems;
      saveWatchlists(data);
      renderWatchlistRuns();
      w2alert(`Added "${run}" under block "${block}" to "${watchlistName}"`);
    };

    window.deleteSelectedRunFromWatchlist = function deleteSelectedRunFromWatchlist() {
      const select = document.getElementById('watchlistSelect');
      const listBox = document.getElementById('watchlistRunsBox');

      if (!select || !select.value) {
        w2alert('Select a watchlist first');
        return;
      }

      if (!listBox || !listBox.value) {
        w2alert('Select a run to delete');
        return;
      }

      let selectedItem;
      try {
        selectedItem = JSON.parse(listBox.value);
      } catch (e) {
        w2alert('Invalid selected run');
        return;
      }

      const data = getWatchlists();
      const watchlistName = select.value;
      data[watchlistName] = (data[watchlistName] || []).filter(item => {
        return !(item.run === selectedItem.run && item.block === selectedItem.block);
      });

      saveWatchlists(data);
      renderWatchlistRuns();
    };

    window.openWatchlistPopupForRun = function openWatchlistPopupForRun(run, block) {
      w2popup.open({
        title: 'Manage Watchlist',
        width: 760,
        height: 560,
        modal: true,
        showMax: false,
        body: `
          <div style="padding:16px; box-sizing:border-box; height:100%; font-family:Arial,sans-serif;">

            <div style="margin-bottom:16px; padding:10px; background:#f7f7f7; border:1px solid #ddd; border-radius:4px;">
              <div style="font-weight:600; margin-bottom:6px;">Current Row</div>
              <div style="font-size:14px; margin-bottom:4px;"><strong>Block:</strong> <span id="currentBlockValue">${escapeHtml(block)}</span></div>
              <div style="font-size:14px;"><strong>Run:</strong> <span id="currentRunValue">${escapeHtml(run)}</span></div>
            </div>

            <div style="margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid #ddd;">
              <div style="font-weight:600; margin-bottom:8px;">Create Watchlist</div>
              <div style="display:flex; gap:10px; align-items:center;">
                <input id="newWatchlistName" type="text" placeholder="Enter watchlist name"
                  style="flex:1; height:34px; padding:6px 10px;" />
                <button class="w2ui-btn" onclick="createWatchlist()">Create</button>
              </div>
            </div>

            <div style="margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid #ddd;">
              <div style="font-weight:600; margin-bottom:8px;">Select or Delete Watchlist</div>
              <div style="display:flex; gap:10px; align-items:center;">
                <select id="watchlistSelect" onchange="renderWatchlistRuns()"
                  style="flex:1; height:34px; padding:6px 10px;"></select>
                <button id="deleteWatchlistBtn" class="w2ui-btn" onclick="deleteWatchlist()">Delete Watchlist</button>
              </div>
              <div style="margin-top:8px; font-size:12px; color:#666;">
                mainlist is predefined and cannot be deleted
              </div>
            </div>

            <div style="margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid #ddd;">
              <div style="font-weight:600; margin-bottom:8px;">Add Current Row Run</div>
              <div style="display:flex; gap:10px; align-items:center;">
                <button class="w2ui-btn" onclick="addCurrentRunToWatchlist()">Add This Run</button>
              </div>
              <div style="margin-top:8px; font-size:12px; color:#666;">
                Maximum ${MAX_RUNS_PER_BLOCK} runs allowed per unique block only in mainlist
              </div>
            </div>

            <div>
              <div style="font-weight:600; margin-bottom:8px;">Runs in Selected Watchlist</div>
              <div id="watchlistCount" style="margin-bottom:8px; font-size:13px; color:#555;">Runs: 0</div>
              <select id="watchlistRunsBox" size="10"
                style="width:100%; height:180px; font-size:14px;"></select>

              <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:12px;">
                <button class="w2ui-btn" onclick="deleteSelectedRunFromWatchlist()">Delete Run</button>
                <button class="w2ui-btn" onclick="w2popup.close()">Close</button>
              </div>
            </div>
          </div>
        `,
        onOpen(event) {
          event.onComplete = () => {
            fillWatchlistDropdown(MAIN_WATCHLIST);
          };
        }
      });
    };

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    getWatchlists();

    new w2grid({
      name: 'grid',
      box: '#grid',
      show: {
        toolbar: true,
        footer: true
      },
      columns: [
        { field: 'recid', text: 'ID', size: '70px' },
        { field: 'block', text: 'Block', size: '120px' },
        { field: 'run', text: 'Run', size: '180px' },
        { field: 'owner', text: 'Owner', size: '120px' },
        { field: 'status', text: 'Status', size: '120px' },
        {
          field: 'watcher',
          text: 'Add to Watcher',
          size: '150px',
          sortable: false,
          searchable: false,
          render(record) {
            const run = String(getRunFromRecord(record)).replaceAll("\\", "\\\\").replaceAll("'", "\\'");
            const block = String(getBlockFromRecord(record)).replaceAll("\\", "\\\\").replaceAll("'", "\\'");
            return `<button class="watch-btn" onclick="openWatchlistPopupForRun('${run}', '${block}')">Watchlist</button>`;
          }
        }
      ],
      records: [
        { recid: 1, block: 'BCPU', run: 'run_001', owner: 'alice', status: 'running' },
        { recid: 2, block: 'LCPU', run: 'run_002', owner: 'bob', status: 'completed' },
        { recid: 3, block: 'MCU', run: 'run_003', owner: 'carol', status: 'failed' },
        { recid: 4, block: 'BCPU', run: 'run_004', owner: 'dave', status: 'running' },
        { recid: 5, block: 'BCPU', run: 'run_005', owner: 'emma', status: 'completed' },
        { recid: 6, block: 'BCPU', run: 'run_006', owner: 'frank', status: 'failed' }
      ]
    });
  </script>
</body>
</html>
